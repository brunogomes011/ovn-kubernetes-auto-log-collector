apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: master
  name: 99-master-ovn-auto-log-collector-remove-after-utilization
spec:
  config:
    ignition:
      version: 3.2.0
    systemd:
      units:
      - contents: |
          [Unit]
          Description=OVN auto log collector script 
          After=kubelet.service
          [Service]
          Type=simple
          ExecStart=/bin/bash /usr/local/bin/ovn-auto-log-collector-remove-it.sh
          Restart=always
          RestartSec=3
          [Install]
          WantedBy=multi-user.target
        enabled: true
        name: ovn-auto-log-collector-workaround.service
    storage:
      files:
      - contents:
          source: data:text/plain;charset=utf-8;base64,
        mode: 493
        path: /usr/local/bin/ovn-auto-log-collector-remove-it.sh
